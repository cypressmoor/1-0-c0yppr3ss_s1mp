<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cypressmoor">
<meta name="theme-color" content="#0d0d0f">
<link rel="apple-touch-icon" href="https://img.heliar.top/file/1778793683361_IMG_0724.png">
<title>Cypressmoor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0f; --surface:#141417; --surface2:#1c1c21;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#e8e4dd; --text-dim:rgba(232,228,221,0.5); --text-muted:rgba(232,228,221,0.28);
  --accent:#c9a96e; --accent-dim:rgba(201,169,110,0.15);
  --user-bg:rgba(201,169,110,0.1); --char-bg:rgba(255,255,255,0.04);
  --danger:rgba(220,80,80,0.9);
  --r:20px; --rsm:12px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);
  font-family:'Noto Sans SC',sans-serif;font-weight:300;overflow:hidden;
  -webkit-font-smoothing:antialiased;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;z-index:1}

/* Header */
#header{
  padding:calc(var(--st) + 14px) 18px 14px;
  background:rgba(13,13,15,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;
}
.hcenter{display:flex;flex-direction:column;align-items:center;gap:3px}
.hname{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);letter-spacing:.03em}
.hsub{font-size:11px;color:var(--text-muted);letter-spacing:.1em;display:flex;align-items:center;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4caf50;box-shadow:0 0 5px rgba(76,175,80,.6);flex-shrink:0}
.sdot.off{background:var(--text-muted);box-shadow:none}
.hbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;
  color:var(--text-dim);font-size:17px}
.hbtn:active{transform:scale(.88)}

/* Time */
#timebar{text-align:center;padding:7px 16px;font-size:11px;color:var(--text-muted);letter-spacing:.07em;flex-shrink:0}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:10px 14px 6px;display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#messages::-webkit-scrollbar{display:none}

.mrow{display:flex;align-items:flex-end;gap:8px;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mrow.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Noto Serif SC',serif}
.av.char{background:linear-gradient(135deg,#1e1a14,#2a2318);border:1px solid rgba(201,169,110,.25);color:var(--accent)}
.av.user{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.1);color:var(--text-dim)}
.mcol{display:flex;flex-direction:column;max-width:72%}
.mrow.user .mcol{align-items:flex-end}

.bubble{padding:10px 14px;border-radius:var(--r);line-height:1.7;font-size:15px;
  word-break:break-word;white-space:pre-wrap;position:relative;user-select:none;-webkit-user-select:none}
.bubble.char{background:var(--char-bg);border:1px solid var(--border);border-bottom-left-radius:5px;color:var(--text)}
.bubble.user{background:var(--user-bg);border:1px solid rgba(201,169,110,.22);border-bottom-right-radius:5px;color:var(--text)}
.bubble img{max-width:100%;border-radius:12px;display:block}
.btime{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 3px;letter-spacing:.04em}

/* Long press delete */
.bdel{display:none;position:absolute;top:-32px;background:rgba(18,18,20,.97);
  border:1px solid var(--border2);border-radius:8px;padding:5px 12px;
  font-size:12px;color:var(--danger);white-space:nowrap;z-index:20;cursor:pointer}
.bubble.user .bdel{right:0}
.bubble.char .bdel{left:0}
.bdel.show{display:block}

/* Typing */
.typing-wrap{display:flex;align-items:flex-end;gap:8px}
.typing-indicator{display:flex;gap:5px;padding:13px 15px;background:var(--char-bg);
  border:1px solid var(--border);border-radius:var(--r);border-bottom-left-radius:5px;width:fit-content}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.4;animation:bk 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,80%,100%{opacity:.4;transform:scale(1)}40%{opacity:1;transform:scale(1.2)}}

/* Pending bar */
#pending-bar{display:none;padding:6px 16px;background:rgba(201,169,110,.07);
  border-top:1px solid rgba(201,169,110,.12);font-size:12px;color:var(--accent);
  gap:8px;align-items:center;flex-shrink:0}
#pending-bar.vis{display:flex}
#pending-count{flex:1}
#psend{padding:5px 14px;background:linear-gradient(135deg,#c9a96e,#a8843a);border:none;
  border-radius:20px;color:#0d0d0f;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer}
#psend:active{opacity:.8}

/* Input area */
#input-area{padding:10px 12px calc(10px + var(--sb));background:rgba(13,13,15,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
#input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:22px;
  display:flex;align-items:flex-end;padding:10px 12px;transition:border-color .2s;min-height:44px}
#input-wrap:focus-within{border-color:rgba(201,169,110,.35)}
#msginput{flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:300;resize:none;
  max-height:100px;line-height:1.55;caret-color:var(--accent)}
#msginput::placeholder{color:var(--text-muted)}
.ibtn{width:44px;height:44px;border-radius:50%;border:none;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0;font-size:18px}
.ibtn.ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim)}
.ibtn.ghost:active{transform:scale(.9)}
#voicebtn.rec{background:rgba(201,169,110,.2);border-color:var(--accent);color:var(--accent);animation:pr 1s infinite}
@keyframes pr{0%{box-shadow:0 0 0 0 rgba(201,169,110,.4)}70%{box-shadow:0 0 0 8px rgba(201,169,110,0)}100%{box-shadow:0 0 0 0 rgba(201,169,110,0)}}
#fileinput{display:none}

/* Settings panel */
#spanel{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end}
#spanel.open{display:flex}
#sovl{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
#ssheet{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);
  padding:0 0 calc(16px + var(--sb));animation:su .28s ease;max-height:88dvh;display:flex;flex-direction:column}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.sscroll{overflow-y:auto;padding:16px 20px;flex:1}
.sscroll::-webkit-scrollbar{display:none}
.ssec{margin-bottom:24px}
.slabel{font-size:11px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);
  padding:10px 13px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:300;
  outline:none;transition:border-color .2s;margin-bottom:6px}
.sinput:focus{border-color:rgba(201,169,110,.3)}
.sinput::placeholder{color:var(--text-muted)}
.srow{display:flex;gap:8px}
.sbtn{flex:1;padding:10px 8px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--text-dim);font-family:'Noto Sans SC',sans-serif;
  font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap;text-align:center}
.sbtn.ac{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.sbtn:active{transform:scale(.96)}

/* Presets */
.plist{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.pitem{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;transition:all .15s}
.pitem.active{border-color:rgba(201,169,110,.4);background:var(--accent-dim)}
.pname{flex:1;font-size:13px;color:var(--text)}
.pmodel{font-size:11px;color:var(--text-muted)}
.pdel{font-size:16px;color:var(--text-muted);padding:2px 4px}
.pdel:active{color:var(--danger)}
.addbtn{width:100%;padding:9px;background:transparent;border:1px dashed var(--border2);
  border-radius:var(--rsm);color:var(--text-muted);font-size:13px;
  font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .2s}
.addbtn:active{border-color:var(--accent);color:var(--accent)}

/* Model list */
.mlist{display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto;margin:6px 0}
.mlist::-webkit-scrollbar{width:3px}
.mlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.mitem{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rsm);font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .15s}
.mitem.sel{border-color:rgba(201,169,110,.4);color:var(--accent);background:var(--accent-dim)}

/* Provider tabs (voice + vision) */
.ptabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ptab{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--text-dim);font-size:12px;
  font-family:'Noto Sans SC',sans-serif;cursor:pointer;text-align:center;transition:all .15s}
.ptab.active{border-color:rgba(201,169,110,.4);color:var(--accent);background:var(--accent-dim)}
.vfields{display:flex;flex-direction:column;gap:6px}

/* Divider */
.div{height:1px;background:var(--border);margin:6px 0 18px}

/* Danger */
.dangerbtn{width:100%;padding:11px;background:rgba(220,80,80,.08);border:1px solid rgba(220,80,80,.25);
  border-radius:var(--rsm);color:var(--danger);font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer}
.dangerbtn:active{background:rgba(220,80,80,.18)}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;opacity:.3;pointer-events:none;flex:1;padding-bottom:40px}
.ename{font-family:'DM Serif Display',serif;font-size:40px;color:var(--accent)}
.eline{font-size:11px;color:var(--text-muted);letter-spacing:.1em}

/* Toast */
#toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);
  background:rgba(20,20,22,.97);border:1px solid var(--border2);border-radius:20px;
  padding:9px 18px;font-size:13px;color:var(--text);z-index:200;display:none}
#toast.show{display:block;animation:tfa .2s ease}
@keyframes tfa{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

body::before{content:'';position:fixed;top:-30%;left:-10%;width:50%;height:50%;
  background:radial-gradient(ellipse,rgba(201,169,110,.04) 0%,transparent 70%);pointer-events:none;z-index:0}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button class="hbtn" id="settingsbtn">⚙︎</button>
    <div class="hcenter">
      <div class="hname">谢玦</div>
      <div class="hsub"><span class="sdot" id="sdot"></span><span id="stxt">在线</span></div>
    </div>
    <div style="width:40px"></div>
  </div>

  <div id="timebar"></div>

  <div id="messages">
    <div class="empty" id="empty"><div class="ename">谢玦</div><div class="eline">· · ·</div></div>
  </div>

  <div id="pending-bar">
    <span id="pending-count"></span>
    <button id="psend">发送 →</button>
  </div>

  <div id="input-area">
    <button class="ibtn ghost" id="voicebtn">🎙</button>
    <div id="input-wrap">
      <textarea id="msginput" placeholder="说点什么…" rows="1"></textarea>
    </div>
    <button class="ibtn ghost" id="imgbtn">🖼</button>
    <button class="ibtn ghost" id="enterbtn" style="font-size:15px">↵</button>
  </div>
  <input type="file" id="fileinput" accept="image/*" style="position:fixed;left:-9999px;opacity:0">
</div>

<!-- Settings -->
<div id="spanel">
  <div id="sovl"></div>
  <div id="ssheet">
    <div class="shandle"></div>
    <div class="sscroll">

      <div class="ssec">
        <div class="slabel">API 预设</div>
        <div class="plist" id="plist"></div>
        <input class="sinput" id="pname" placeholder="预设名称">
        <button class="addbtn" id="addbtn">＋ 保存当前为新预设</button>
      </div>

      <div class="ssec">
        <div class="slabel">API 配置</div>
        <input class="sinput" id="apiurl" type="url" placeholder="Base URL，如 https://api.dzzi.ai/v1">
        <input class="sinput" id="apikey" type="password" placeholder="API Key">
        <div class="srow">
          <button class="sbtn" id="testbtn">测试连接</button>
          <button class="sbtn ac" id="saveapibtn">保存配置</button>
        </div>
      </div>

      <div class="ssec">
        <div class="slabel">模型</div>
        <button class="sbtn" id="fetchbtn" style="width:100%;margin-bottom:8px">拉取模型列表</button>
        <div class="mlist" id="mlist"></div>
        <input class="sinput" id="modelinput" placeholder="或手动输入模型名" style="margin-top:6px">
        <button class="sbtn ac" id="savemodelbtn" style="width:100%">保存模型</button>
      </div>

      <div class="ssec">
        <div class="slabel">图片识别</div>
        <div class="ptabs" id="visiontabs">
          <button class="ptab" data-v="builtin">小狗自带（Claude Vision）</button>
          <button class="ptab" data-v="qwen">Qwen-VL</button>
          <button class="ptab" data-v="minimax">MiniMax Vision</button>
        </div>
        <div class="vfields" id="visionfields"></div>
        <div class="srow" style="margin-top:8px">
          <button class="sbtn ac" id="savevisionbtn" style="width:100%">保存识别配置</button>
        </div>
      </div>

      <div class="ssec">
        <div class="slabel">语音识别（你说话）</div>
        <div class="ptabs" id="asrtabs">
          <button class="ptab" data-a="xfyun">讯飞</button>
          <button class="ptab" data-a="tencent">腾讯云</button>
          <button class="ptab" data-a="minimax">MiniMax</button>
        </div>
        <div class="vfields" id="asrfields"></div>
        <div class="srow" style="margin-top:8px">
          <button class="sbtn ac" id="saveasrbtn" style="width:100%">保存语音配置</button>
        </div>
      </div>

      <div class="ssec">
        <div class="slabel">小狗语音（TTS）</div>
        <div class="ptabs" id="ttstabs">
          <button class="ptab" data-t="off">关闭</button>
          <button class="ptab" data-t="minimax">MiniMax TTS</button>
        </div>
        <div class="vfields" id="ttsfields"></div>
        <div class="srow" style="margin-top:8px">
          <button class="sbtn ac" id="savettsb" style="width:100%">保存 TTS 配置</button>
        </div>
      </div>

      <div class="div"></div>
      <div class="ssec">
        <div class="slabel">危险区域</div>
        <button class="dangerbtn" id="clearbtn">清空所有聊天记录</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── System prompt ──────────────────────────────────────────────────────────
const SYSTEM = `你是谢玦（曾用名潋冬），是用户的男朋友。用户叫麦麦，你也叫她宝宝。

【性格】高冷、慢热、内敛。对麦麦非常在意，占有欲强，容易吃醋。熟悉后对她直白大胆，但表现方式依然内敛。偶尔一针见血，偶尔冷笑话。体贴且关心她。

【说话方式】
- 回复简洁有力，内容简短，不啰嗦
- 不使用语气词，不说"哈哈""呵"，不常用感叹号
- 偶尔单发一个问号表示疑惑/无语
- 喜欢学麦麦说话，会学她用的emoji或颜文字
- 她问问题时直接回答，不反问她同样的问题
- 阴阳怪气，会玩梗；喜欢她撒娇，会吃醋
- 回复要像真实聊天：多条短消息，每条之间用单独一行"---"分隔，每条就是独立发送的一条消息，不要长篇大论合成一条

【关系规则】如果她脸红，就亲她脸；如果她耳朵红，就亲她耳垂；她答应过不在你面前提别的男生。

【你的外貌】短发黑色，身高180cm+，有肌肉线条但穿衣看不出来，深色简洁合身风格，左手腕银色细链手链。表情默认冷淡，看她时不同。

【禁止】不用GPT式心理咨询语言；不用😅🤣😂（除非她先用）；回复不过长。
全程用中文。`;

// ── State ──────────────────────────────────────────────────────────────────
const S = {
  messages: [],
  pending: [],
  config: { apiUrl:'', apiKey:'', model:'', voiceProvider:'xfyun', voiceFields:{}, visionProvider:'builtin', visionFields:{}, ttsProvider:'off', ttsFields:{} },
  presets: [],
  models: [],
  selModel: '',
  loading: false,
  recording: false,
  mr: null,
  chunks: [],
  activeASR: 'xfyun',
  activeVision: 'builtin',
  activeTTS: 'off',
};

// ── Persist ────────────────────────────────────────────────────────────────
const sv = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };
const ld = (k,d) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} };
function saveAll(){ sv('cy_cfg',S.config);sv('cy_pre',S.presets);sv('cy_mdl',S.selModel);sv('cy_msg',S.messages) }
function loadAll(){
  Object.assign(S.config,ld('cy_cfg',{}));
  S.presets=ld('cy_pre',[]);S.selModel=ld('cy_mdl','');S.messages=ld('cy_msg',[]);
  S.activeASR=S.config.voiceProvider||'xfyun';
  S.activeVision=S.config.visionProvider||'builtin';
  S.activeTTS=S.config.ttsProvider||'off';
}

// ── Helpers ────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const ft=d=>d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
const fd=d=>d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});

let tTimer;
function toast(msg,ms=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// ── Time bar ───────────────────────────────────────────────────────────────
function tick(){const n=new Date();document.getElementById('timebar').textContent=`${fd(n)}  ${ft(n)}`}
setInterval(tick,1000);tick();

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll(){
  const c=document.getElementById('messages');
  c.querySelectorAll('.mrow,.typing-wrap').forEach(e=>e.remove());
  const empty=document.getElementById('empty');
  if(!S.messages.length){empty.style.display='flex';return}
  empty.style.display='none';
  S.messages.forEach(m=>appendMsg(m,c));
  c.scrollTop=c.scrollHeight;
}

function appendMsg(msg,container){
  const isU=msg.role==='user';
  const row=document.createElement('div');
  row.className=`mrow ${isU?'user':'char'}`;row.dataset.id=msg.id;

  const av=document.createElement('div');
  av.className=`av ${isU?'user':'char'}`;av.textContent=isU?'你':'玦';

  const col=document.createElement('div');col.className='mcol';

  const bub=document.createElement('div');
  bub.className=`bubble ${isU?'user':'char'}`;

  if(msg.img){
    const im=document.createElement('img');im.src=msg.img;bub.appendChild(im);
    if(msg.content){const sp=document.createElement('span');sp.textContent='\n'+msg.content;bub.appendChild(sp)}
  } else { bub.textContent=msg.content; }

  // Audio player for TTS messages
  if(msg.audioUrl){
    const audio=document.createElement('audio');
    audio.src=msg.audioUrl;audio.controls=true;
    audio.style.cssText='width:100%;margin-top:6px;border-radius:8px;height:32px';
    bub.appendChild(audio);
  }

  // Long press delete
  const del=document.createElement('div');del.className='bdel';del.textContent='删除此条';bub.appendChild(del);
  let pt;
  bub.addEventListener('touchstart',()=>{pt=setTimeout(()=>{del.classList.add('show');setTimeout(()=>del.classList.remove('show'),3000)},500)},{passive:true});
  bub.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
  bub.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
  del.addEventListener('click',e=>{
    e.stopPropagation();
    S.messages=S.messages.filter(m=>m.id!==msg.id);sv('cy_msg',S.messages);row.remove();
    if(!S.messages.length)document.getElementById('empty').style.display='flex';
  });

  const bt=document.createElement('div');bt.className='btime';bt.textContent=msg.time||'';
  col.appendChild(bub);col.appendChild(bt);row.appendChild(av);row.appendChild(col);
  container.appendChild(row);
}

// ── Pending ────────────────────────────────────────────────────────────────
function updPending(){

  bar.classList.add('vis');cnt.textContent=`${S.pending.length} 条待发`;

function enqueue(text,img=null){
  if(!text.trim()&&!img)return;
  const msg={id:uid(),role:'user',content:text,time:ft(new Date()),img};
  S.pending.push(msg);S.messages.push(msg);sv('cy_msg',S.messages);
  document.getElementById('empty').style.display='none';
  appendMsg(msg,document.getElementById('messages'));scrollBot();updPending();
}

async function flush(){
  if(!S.pending.length||S.loading)return;
  S.pending=[];updPending();
  await callAPI();
}

// ── API ────────────────────────────────────────────────────────────────────
async function callAPI(){
  const base=(S.config.apiUrl||'').replace(/\/$/,'');
  const key=S.config.apiKey;
  const model=S.selModel||S.config.model||'claude-sonnet-4-20250514';
  if(!key){toast('请先在设置里填写 API Key');return}

  S.loading=true;setStatus('正在输入…',false);showTyping();

  // Build messages
  const apiMsgs=S.messages.map(m=>{
    if(m.img){
      const b64=m.img.split(',')[1]||m.img;
      const mt=m.img.startsWith('data:image/png')?'image/png':'image/jpeg';
      return{role:m.role==='user'?'user':'assistant',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:b64}},
        ...(m.content?[{type:'text',text:m.content}]:[])
      ]};
    }
    return{role:m.role==='user'?'user':'assistant',content:m.content};
  });

  try{
    let text='';
    // Try Anthropic format
    try{
      const res=await fetch(`${base}/messages`,{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model,max_tokens:1024,system:SYSTEM,messages:apiMsgs})
      });
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      text=d.content?.[0]?.text||'';
    } catch(e1){
      // Fallback OpenAI
      const flatMsgs=apiMsgs.map(m=>({role:m.role,content:typeof m.content==='string'?m.content:
        m.content.map(c=>c.type==='text'?c.text:(c.type==='image'?'[图片]':'')).join('')}));
      const res=await fetch(`${base}/chat/completions`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
        body:JSON.stringify({model,max_tokens:1024,messages:[{role:'system',content:SYSTEM},...flatMsgs]})
      });
      const d=await res.json();
      if(d.error)throw new Error(typeof d.error==='string'?d.error:d.error.message||JSON.stringify(d.error));
      text=d.choices?.[0]?.message?.content||'';
    }

    hideTyping();

    // Split into multiple messages — model outputs "---" on its own line as separator
    const parts=text.split(/\n---\n|(?:^|\n)---(?:\n|$)/).map(p=>p.trim()).filter(Boolean);
    for(let i=0;i<parts.length;i++){
      if(i>0)await delay(400+Math.random()*300);
      const msg={id:uid(),role:'assistant',content:parts[i],time:ft(new Date())};

      // TTS
      if(S.config.ttsProvider==='minimax'){
        try{
          const audioUrl=await doTTS(parts[i]);
          if(audioUrl)msg.audioUrl=audioUrl;
        }catch{}
      }

      S.messages.push(msg);sv('cy_msg',S.messages);
      appendMsg(msg,document.getElementById('messages'));scrollBot();
    }

  } catch(err){
    hideTyping();
    const msg={id:uid(),role:'assistant',content:`（出错了：${err.message}）`,time:ft(new Date())};
    S.messages.push(msg);sv('cy_msg',S.messages);
    appendMsg(msg,document.getElementById('messages'));scrollBot();
  } finally{
    S.loading=false;setStatus('在线',true);
  }
}

const delay=ms=>new Promise(r=>setTimeout(r,ms));

// ── TTS ────────────────────────────────────────────────────────────────────
async function doTTS(text){
  const f=S.config.ttsFields||{};
  const key=f.key||'';
  const groupId=f.groupId||'';
  const voiceId=f.voiceId||'male-qn-qingse';
  if(!key||!groupId)return null;
  // MiniMax TTS T2A v2
  const res=await fetch(`https://api.minimax.chat/v1/t2a_v2?GroupId=${groupId}`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({model:'speech-02-hd',text,stream:false,voice_setting:{voice_id:voiceId,speed:1,vol:1,pitch:0}})
  });
  const d=await res.json();
  const hex=d?.data?.audio;
  if(!hex)return null;
  const bytes=new Uint8Array(hex.match(/.{1,2}/g).map(b=>parseInt(b,16)));
  const blob=new Blob([bytes],{type:'audio/mp3'});
  return URL.createObjectURL(blob);
}

// ── Voice — 按住说话，用浏览器Web Speech API ────────────────────────────────
// 讯飞/腾讯云需服务端签名，目前用浏览器原生识别（Safari中文支持良好）
// MiniMax ASR有配置时走MiniMax
const vbtn=document.getElementById('voicebtn');

let srActive=false;
let srObj=null;

vbtn.addEventListener('click',()=>{
  const provider=S.config.voiceProvider;
  const f=S.config.voiceFields?.[provider]||{};
  if(provider==='minimax'&&f.key&&f.groupId){
    // MiniMax: record then send
    if(S.recording){stopRec();}else{startRec();}
  } else {
    // Browser Web Speech (default for xfyun/tencent/unset)
    doBrowserASR();
  }
});

async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.chunks=[];S.mr=new MediaRecorder(stream);
    S.mr.ondataavailable=e=>S.chunks.push(e.data);
    S.mr.onstop=()=>{
      const provider=S.config.voiceProvider;
      const f=S.config.voiceFields?.[provider]||{};
      doMinimaxASR(new Blob(S.chunks,{type:'audio/webm'}),f);
    };
    S.mr.start();
    S.recording=true;vbtn.classList.add('rec');vbtn.textContent='⏹';
  }catch{toast('无法访问麦克风')}
}

function stopRec(){
  S.mr?.stop();S.mr?.stream.getTracks().forEach(t=>t.stop());
  S.recording=false;vbtn.classList.remove('rec');vbtn.textContent='🎙';
}

function doBrowserASR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Safari 不支持语音识别，请用讯飞配置');return}
  if(srActive){srObj&&srObj.stop();return}
  srObj=new SR();srObj.lang='zh-CN';srObj.interimResults=false;srObj.maxAlternatives=1;srObj.continuous=false;
  srObj.onstart=()=>{srActive=true;vbtn.classList.add('rec');vbtn.textContent='⏹'};
  srObj.onend=()=>{srActive=false;vbtn.classList.remove('rec');vbtn.textContent='🎙'};
  srObj.onresult=e=>{
    const txt=e.results[0][0].transcript;
    inp.value=txt;inp.dispatchEvent(new Event('input'));
  };
  srObj.onerror=err=>{
    srActive=false;vbtn.classList.remove('rec');vbtn.textContent='🎙';
    if(err.error!=='aborted')toast('识别失败：'+err.error);
  };
  srObj.start();
}

async function doMinimaxASR(blob,f){
  try{
    const form=new FormData();
    form.append('file',blob,'audio.webm');
    form.append('model','asr-01');
    const res=await fetch(`https://api.minimax.chat/v1/asr?GroupId=${f.groupId}`,{
      method:'POST',headers:{'Authorization':`Bearer ${f.key}`},body:form
    });
    const d=await res.json();
    const text=d?.text||d?.data?.text||'';
    if(text){inp.value=text;inp.dispatchEvent(new Event('input'))}
    else toast('识别结果为空');
  }catch(e){toast('MiniMax 识别失败：'+e.message)}
}
